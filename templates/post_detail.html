{% extends "base.html" %}

{% block content %}

<h1 style="color:white;">{{ post.title }}</h1>
<p style="color:yellow;">{{ post.content }}</p>

<hr>

<h2 style="color:white;">Comments</h2>

{% for comment in comments %}
<div class="card">
     <b>{{ comment.username }}</b>
     <p>{{ comment.content }}</p>
</div>
{% endfor %}

<h3 style="color:white;">Add Comment</h3>

<form method="POST">
    <textarea name="content" placeholder="Write comment"></textarea><br>
    <button type="submit">Comment</button>
</form>

{% endblock %}
