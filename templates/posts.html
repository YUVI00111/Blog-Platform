{% extends "base.html" %}

{% block content %}

<h1 style="color:white;">All Blog Posts</h1>

{% for post in posts %}

<div class="card">

<h2>{{ post.title }}</h2>
<p>{{ post.content }}</p>

<a href="/edit/{{ post.id }}">Edit</a>
<a href="/delete/{{ post.id }}">Delete</a>

</div>

{% endfor %}

{% endblock %}
